<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人財務儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .dark .glass-card {
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        input[type="month"]::-webkit-calendar-picker-indicator,
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
        }
        .dark input[type="month"]::-webkit-calendar-picker-indicator,
        .dark input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 bg-gray-100 dark:bg-gray-900 antialiased min-h-screen flex flex-col transition-colors duration-200">

    <!-- 登入畫面 -->
    <div id="loginScreen" class="fixed inset-0 bg-gray-900/95 z-[100] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center border border-gray-200 dark:border-gray-700 transition-colors duration-200">
            <div class="flex justify-center mb-4 text-blue-600 dark:text-blue-400">
                <i data-lucide="lock" class="w-12 h-12"></i>
            </div>
            <h2 class="text-xl font-bold mb-6 text-gray-800 dark:text-gray-100">請輸入專屬密碼</h2>
            <input type="password" id="pwdInput" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg mb-4 text-center focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 transition-colors">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">登入</button>
            <p id="loginError" class="text-red-500 dark:text-red-400 text-sm mt-3 hidden">密碼錯誤或載入失敗</p>
        </div>
    </div>

    <!-- 記帳表單 Modal -->
    <div id="recordModal" onclick="handleModalClick(event)" class="fixed inset-0 bg-gray-900/80 z-[100] flex items-center justify-center hidden backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-gray-200 dark:border-gray-700 transition-colors duration-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">新增記帳</h2>
                <button onclick="closeRecordModal()" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="recordForm" onsubmit="submitRecord(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">收支類型</label>
                        <select id="recordType" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                            <option value="支出">支出</option>
                            <option value="收入">收入</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">日期</label>
                        <input type="date" id="recordDate" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">分類</label>
                    <select id="recordCategory" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                        <option value="" disabled selected>請選擇分類</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">品項</label>
                    <input type="text" id="recordItem" placeholder="例如：午餐、停車費" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">金額</label>
                    <input type="number" id="recordAmount" placeholder="0" min="0" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-white" required>
                </div>
                <button type="submit" id="submitRecordBtn" class="w-full bg-blue-600 text-white py-3 mt-4 rounded-lg font-bold hover:bg-blue-700 transition-colors">儲存</button>
            </form>
        </div>
    </div>

    <!-- 導覽列 -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50 transition-colors duration-200">
        <div class="flex items-center gap-2">
            <i data-lucide="wallet" class="text-blue-600 dark:text-blue-400 w-6 h-6"></i>
            <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">財務儀表板</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="loadingStatus" class="text-sm text-gray-500 dark:text-gray-400 hidden sm:block">讀取中...</div>
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-600 dark:text-gray-300">
                <i id="themeIcon" data-lucide="sun" class="w-5 h-5"></i>
            </button>
            <button id="logoutBtn" onclick="logout()" class="text-sm text-red-500 dark:text-red-400 font-medium bg-red-50 dark:bg-red-900/30 px-3 py-1 rounded hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors hidden">登出</button>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main id="mainContent" class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-12 gap-6 hidden pb-24">
        
        <div class="md:col-span-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card rounded-2xl p-5 flex items-center gap-4 transition-colors">
                <div class="bg-blue-100 dark:bg-blue-900/50 p-3 rounded-full text-blue-600 dark:text-blue-400">
                    <i data-lucide="landmark" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">總資產</p>
                    <h3 id="totalAssets" class="text-2xl font-bold text-gray-800 dark:text-white">$0</h3>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-5 flex items-center gap-4 transition-colors">
                <div class="bg-green-100 dark:bg-green-900/50 p-3 rounded-full text-green-600 dark:text-green-400">
                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">本月收入</p>
                    <h3 id="monthlyIncome" class="text-2xl font-bold text-gray-800 dark:text-white">$0</h3>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-5 flex items-center gap-4 transition-colors">
                <div class="bg-red-100 dark:bg-red-900/50 p-3 rounded-full text-red-600 dark:text-red-400">
                    <i data-lucide="trending-down" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">本月支出</p>
                    <h3 id="monthlyExpense" class="text-2xl font-bold text-gray-800 dark:text-white">$0</h3>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-5 flex items-center gap-4 transition-colors">
                <div class="bg-purple-100 dark:bg-purple-900/50 p-3 rounded-full text-purple-600 dark:text-purple-400">
                    <i data-lucide="piggy-bank" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">本月結餘</p>
                    <h3 id="monthlyBalance" class="text-2xl font-bold text-gray-800 dark:text-white">$0</h3>
                </div>
            </div>
        </div>

        <div class="md:col-span-8 glass-card rounded-2xl p-6 transition-colors">
            <h2 class="text-lg font-bold text-gray-800 dark:text-white mb-4">近六個月收支趨勢</h2>
            <div class="relative h-64 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="md:col-span-4 glass-card rounded-2xl p-6 flex flex-col transition-colors">
            <h2 class="text-lg font-bold text-gray-800 dark:text-white mb-4">本月支出結構</h2>
            <div class="relative flex-1 w-full flex items-center justify-center min-h-[200px]">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="md:col-span-12 glass-card rounded-2xl p-6 transition-colors">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800 dark:text-white">最近交易紀錄</h2>
                <select id="recentLimitSelector" onchange="updateRecentLimit()" class="text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded border-none focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                    <option value="10">僅顯示最新 10 筆</option>
                    <option value="30">最新 30 筆</option>
                    <option value="currentMonth">顯示當月全部紀錄</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400 select-none">
                            <th class="pb-3 pl-2 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleRecentSort('timestamp')">日期 <span id="rsort-timestamp" class="text-xs inline-block w-3 text-blue-500">▼</span></th>
                            <th class="pb-3 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleRecentSort('category')">分類 <span id="rsort-category" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                            <th class="pb-3 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleRecentSort('item')">品項 <span id="rsort-item" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                            <th class="pb-3 font-medium text-right pr-2 cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 w-28" onclick="handleRecentSort('rawAmount')">金額 <span id="rsort-rawAmount" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                        </tr>
                    </thead>
                    <tbody id="transactionList" class="text-sm">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="md:col-span-12 glass-card rounded-2xl p-6 mt-2 transition-colors">
            <div class="flex flex-col mb-4 gap-4">
                <h2 class="text-lg font-bold text-gray-800 dark:text-white">明細交叉查詢</h2>
                <div class="flex flex-col lg:flex-row gap-3">
                    <select id="timeFilterType" class="w-full lg:w-40 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                        <option value="month">單一月份</option>
                        <option value="range">自訂範圍</option>
                        <option value="all">全部時間</option>
                    </select>
                    
                    <div id="timeInputContainer" class="flex gap-2 flex-1">
                        <input type="month" id="monthSelector" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                        <div id="dateRangeContainer" class="flex gap-2 w-full hidden">
                            <input type="date" id="startDate" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                            <span class="text-gray-500 self-center">至</span>
                            <input type="date" id="endDate" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                        </div>
                    </div>
                    
                    <select id="categorySelector" class="w-full lg:w-40 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                        <option value="">全部分類</option>
                    </select>
                    <input type="text" id="itemSearch" placeholder="搜尋品項關鍵字" class="w-full lg:w-48 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white dark:bg-gray-700 text-gray-800 dark:text-white transition-colors">
                </div>
            </div>
            <div class="flex gap-4 mb-4 text-sm">
                <span class="text-green-600 dark:text-green-400 font-medium" id="selectedMonthIncome">收入: $0</span>
                <span class="text-red-500 dark:text-red-400 font-medium" id="selectedMonthExpense">支出: $0</span>
                <span class="text-gray-800 dark:text-gray-200 font-bold" id="selectedMonthBalance">結餘: $0</span>
            </div>
            <div class="overflow-y-auto max-h-96 rounded-lg">
                <table class="w-full text-left border-collapse relative">
                    <thead class="sticky top-0 bg-white dark:bg-gray-800 shadow-sm z-10 transition-colors">
                        <tr class="border-b border-gray-100 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400 select-none">
                            <th class="pb-3 pl-2 pt-2 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleSort('timestamp')">日期 <span id="sort-timestamp" class="text-xs inline-block w-3 text-blue-500">▼</span></th>
                            <th class="pb-3 pt-2 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleSort('category')">分類 <span id="sort-category" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                            <th class="pb-3 pt-2 font-medium cursor-pointer hover:text-blue-600 dark:hover:text-blue-400" onclick="handleSort('item')">品項 <span id="sort-item" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                            <th class="pb-3 pt-2 font-medium text-right pr-2 cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 w-28" onclick="handleSort('rawAmount')">金額 <span id="sort-rawAmount" class="text-xs inline-block w-3 text-transparent">▼</span></th>
                        </tr>
                    </thead>
                    <tbody id="filteredTransactionList" class="text-sm">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 浮動新增按鈕 -->
        <button onclick="openRecordModal()" class="fixed bottom-8 right-8 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 hover:scale-105 transition-all z-40 focus:outline-none focus:ring-4 focus:ring-blue-300">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
        
        <!-- Toast 通知 -->
        <div id="toastMessage" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[200]">
            <span id="toastText">通知訊息</span>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXd15o5FwyuStWYp3AkIKqgjRkbtGn8rkCPB45G2xBVsFBgekKd01YVb3w6wWOtAeT/exec";

        let trendChartInstance = null;
        let categoryChartInstance = null;
        let globalData = []; 
        let currentPwd = localStorage.getItem('finance_pwd') || "";
        let categoryTotalsCache = {};
        let trendDataCache = {};
        let filteredDataCache = [];
        let currentSort = { key: 'timestamp', dir: 'desc' };
        let recentDataCache = [];
        let recentSort = { key: 'timestamp', dir: 'desc' };
        let allTransactionsCache = [];

        function initTheme() {
            if (localStorage.theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
            updateThemeIcon();
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
            updateThemeIcon();
            if (Object.keys(categoryTotalsCache).length > 0) {
                renderCategoryChart(categoryTotalsCache);
                renderTrendChart(trendDataCache);
            }
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const iconEl = document.getElementById('themeIcon');
            iconEl.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        window.onload = () => {
            initTheme();
            lucide.createIcons();

            document.getElementById('timeFilterType').addEventListener('change', handleTimeFilterChange);
            document.getElementById('monthSelector').addEventListener('change', triggerFilter);
            document.getElementById('startDate').addEventListener('change', triggerFilter);
            document.getElementById('endDate').addEventListener('change', triggerFilter);
            document.getElementById('categorySelector').addEventListener('change', triggerFilter);
            document.getElementById('itemSearch').addEventListener('input', triggerFilter);

            document.getElementById('pwdInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    login();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !document.getElementById('recordModal').classList.contains('hidden')) {
                    closeRecordModal();
                }
            });

            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(today - offset)).toISOString().split('T')[0];
            document.getElementById('recordDate').value = localISOTime;

            if (!currentPwd) {
                document.getElementById('loadingStatus').innerText = '請先登入';
                document.getElementById('loginScreen').classList.remove('hidden');
            } else {
                initApp();
            }
        };

        function handleTimeFilterChange() {
            const type = document.getElementById('timeFilterType').value;
            const monthSel = document.getElementById('monthSelector');
            const dateRange = document.getElementById('dateRangeContainer');

            if (type === 'month') {
                monthSel.classList.remove('hidden');
                dateRange.classList.add('hidden');
            } else if (type === 'range') {
                monthSel.classList.add('hidden');
                dateRange.classList.remove('hidden');
            } else {
                monthSel.classList.add('hidden');
                dateRange.classList.add('hidden');
            }
            triggerFilter();
        }

        function triggerFilter() {
            const timeType = document.getElementById('timeFilterType').value;
            const month = document.getElementById('monthSelector').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const category = document.getElementById('categorySelector').value;
            const item = document.getElementById('itemSearch').value.trim();
            renderFilteredDetails(timeType, month, start, end, category, item);
        }

        function login() {
            const pwd = document.getElementById('pwdInput').value;
            if (!pwd) return;
            
            document.getElementById('loginError').classList.add('hidden');
            currentPwd = pwd;
            initApp();
        }

        function logout() {
            localStorage.removeItem('finance_pwd');
            location.reload();
        }

        function handleModalClick(event) {
            if (event.target.id === 'recordModal') {
                closeRecordModal();
            }
        }

        function openRecordModal() {
            document.getElementById('recordModal').classList.remove('hidden');
        }

        function closeRecordModal() {
            document.getElementById('recordModal').classList.add('hidden');
            document.getElementById('recordForm').reset();
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(today - offset)).toISOString().split('T')[0];
            document.getElementById('recordDate').value = localISOTime;
            document.getElementById('recordType').value = '支出';
        }

        async function submitRecord(event) {
            event.preventDefault();
            const btn = document.getElementById('submitRecordBtn');
            btn.disabled = true;
            btn.innerText = '儲存中...';
            btn.classList.add('opacity-75');

            const payload = {
                date: document.getElementById('recordDate').value,
                type: document.getElementById('recordType').value,
                category: document.getElementById('recordCategory').value,
                item: document.getElementById('recordItem').value,
                amount: document.getElementById('recordAmount').value
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                closeRecordModal();
                showToast('記帳成功');
                initApp();
            } catch (error) {
                alert('儲存失敗，請檢查網路連線或 Apps Script 權限。');
            } finally {
                btn.disabled = false;
                btn.innerText = '儲存';
                btn.classList.remove('opacity-75');
            }
        }

        async function initApp() {
            if (API_URL === "YOUR_NEW_APPS_SCRIPT_URL_HERE") {
                document.getElementById('loginError').innerText = "尚未設定 API_URL";
                document.getElementById('loginError').classList.remove('hidden');
                return;
            }

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loadingStatus').innerText = '資料更新中...';
            document.getElementById('loadingStatus').classList.remove('hidden');
            
            const fetchUrl = `${API_URL}?pwd=${encodeURIComponent(currentPwd)}`;
            
            try {
                const response = await fetch(fetchUrl, { redirect: 'follow' });
                const text = await response.text();
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseError) {
                    throw new Error("解析資料失敗，權限可能受限。請確認部署設定為「所有人」。");
                }
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                localStorage.setItem('finance_pwd', currentPwd);
                document.getElementById('loadingStatus').innerText = '資料已更新';
                setTimeout(() => document.getElementById('loadingStatus').classList.add('hidden'), 3000);
                renderDashboard(data);
            } catch (error) {
                document.getElementById('loadingStatus').innerText = '驗證失敗';
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('loginError').innerText = error.message === "密碼錯誤" ? "密碼錯誤，請重新輸入" : "連線錯誤：" + error.message;
                document.getElementById('loginError').classList.remove('hidden');
                localStorage.removeItem('finance_pwd');
            }
        }

        function renderDashboard(data) {
            if (!data || data.length === 0) return;

            globalData = data; 
            let totalAssets = 0;
            let monthlyIncome = 0;
            let monthlyExpense = 0;
            const currentMonth = new Date().getMonth() + 1;
            categoryTotalsCache = {};
            const transactions = [];
            trendDataCache = {};
            const today = new Date();
            const uniqueCategories = new Set();

            for (let i = 5; i >= 0; i--) {
                const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                trendDataCache[key] = { income: 0, expense: 0, label: `${d.getMonth() + 1}月` };
            }

            data.forEach(row => {
                const dateObj = new Date(row["日期"]);
                const month = dateObj.getMonth() + 1;
                const type = row["收支"];
                const expense = Number(row["支出金額"]) || 0;
                const income = Number(row["收入金額"]) || 0;
                const category = row["分類"];

                if (category && type !== "初始餘額" && type !== "資產") {
                    uniqueCategories.add(category);
                }

                totalAssets += (income - expense);

                if (month === currentMonth && dateObj.getFullYear() === today.getFullYear()) {
                    if (type === "收入" || income > 0) monthlyIncome += income;
                    if (type === "支出" || expense > 0) {
                        monthlyExpense += expense;
                        if (category) {
                            categoryTotalsCache[category] = (categoryTotalsCache[category] || 0) + expense;
                        }
                    }
                }

                const trendKey = `${dateObj.getFullYear()}-${String(month).padStart(2, '0')}`;
                if (trendDataCache[trendKey]) {
                    trendDataCache[trendKey].income += income;
                    trendDataCache[trendKey].expense += expense;
                }

                if (type !== "初始餘額") {
                    transactions.push({
                        date: dateObj.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' }),
                        category: category,
                        item: row["品項"],
                        amount: type === "支出" || expense > 0 ? `-$${expense}` : `+$${income}`,
                        rawAmount: type === "支出" || expense > 0 ? -expense : income,
                        isExpense: type === "支出" || expense > 0,
                        timestamp: dateObj.getTime()
                    });
                }
            });

            const catSelect = document.getElementById('categorySelector');
            const recordCatSelect = document.getElementById('recordCategory');
            catSelect.innerHTML = '<option value="">全部分類</option>';
            recordCatSelect.innerHTML = '<option value="" disabled selected>請選擇分類</option>';
            Array.from(uniqueCategories).sort().forEach(cat => {
                const optionSelect = document.createElement('option');
                optionSelect.value = cat;
                optionSelect.textContent = cat;
                catSelect.appendChild(optionSelect);

                const optionRecord = document.createElement('option');
                optionRecord.value = cat;
                optionRecord.textContent = cat;
                recordCatSelect.appendChild(optionRecord);
            });

            document.getElementById('totalAssets').innerText = `$${totalAssets.toLocaleString()}`;
            document.getElementById('monthlyIncome').innerText = `$${monthlyIncome.toLocaleString()}`;
            document.getElementById('monthlyExpense').innerText = `$${monthlyExpense.toLocaleString()}`;
            document.getElementById('monthlyBalance').innerText = `$${(monthlyIncome - monthlyExpense).toLocaleString()}`;

            transactions.sort((a, b) => b.timestamp - a.timestamp);
            allTransactionsCache = transactions;
            updateRecentLimit();
            updateRecentSortIcons();

            renderCategoryChart(categoryTotalsCache);
            renderTrendChart(trendDataCache);
            
            const currentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const monthSelector = document.getElementById('monthSelector');
            if (!monthSelector.value) {
                monthSelector.value = currentMonthStr;
            }
            triggerFilter();
        }

        function updateRecentLimit() {
            const limit = document.getElementById('recentLimitSelector').value;
            if (limit === 'currentMonth') {
                const today = new Date();
                recentDataCache = allTransactionsCache.filter(t => {
                    const tDate = new Date(t.timestamp);
                    return tDate.getFullYear() === today.getFullYear() && tDate.getMonth() === today.getMonth();
                });
            } else {
                recentDataCache = allTransactionsCache.slice(0, parseInt(limit, 10));
            }
            applyRecentSortAndRender();
        }

        function renderFilteredDetails(timeType, monthVal, startVal, endVal, filterCategory, filterItem) {
            if (!globalData) return;
            
            let totalIncome = 0;
            let totalExpense = 0;
            filteredDataCache = [];

            globalData.forEach(row => {
                const dateObj = new Date(row["日期"]);
                const type = row["收支"];
                const category = row["分類"] || '';
                const item = row["品項"] || '';
                
                if (type === "初始餘額" || type === "資產") return;

                let timeMatch = false;
                if (timeType === 'all') {
                    timeMatch = true;
                } else if (timeType === 'month' && monthVal) {
                    const [targetYear, targetMonth] = monthVal.split('-');
                    const year = dateObj.getFullYear();
                    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                    if (year == targetYear && month == targetMonth) timeMatch = true;
                } else if (timeType === 'range') {
                    const rowTime = dateObj.getTime();
                    const sTime = startVal ? new Date(startVal).getTime() : 0;
                    const eTime = endVal ? new Date(endVal).setHours(23, 59, 59, 999) : Infinity;
                    if (rowTime >= sTime && rowTime <= eTime) timeMatch = true;
                }

                if (!timeMatch) return;
                if (filterCategory && category !== filterCategory) return;
                if (filterItem && !item.toLowerCase().includes(filterItem.toLowerCase())) return;

                const expense = Number(row["支出金額"]) || 0;
                const income = Number(row["收入金額"]) || 0;
                
                if (type === "收入" || income > 0) totalIncome += income;
                if (type === "支出" || expense > 0) totalExpense += expense;

                filteredDataCache.push({
                    date: dateObj.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }),
                    category: category,
                    item: item,
                    amount: type === "支出" || expense > 0 ? `-$${expense}` : `+$${income}`,
                    rawAmount: type === "支出" || expense > 0 ? -expense : income,
                    isExpense: type === "支出" || expense > 0,
                    timestamp: dateObj.getTime()
                });
            });

            document.getElementById('selectedMonthIncome').innerText = `收入: $${totalIncome.toLocaleString()}`;
            document.getElementById('selectedMonthExpense').innerText = `支出: $${totalExpense.toLocaleString()}`;
            document.getElementById('selectedMonthBalance').innerText = `結餘: $${(totalIncome - totalExpense).toLocaleString()}`;

            updateSortIcons();
            applySortAndRender();
        }

        function handleRecentSort(key) {
            if (recentSort.key === key) {
                recentSort.dir = recentSort.dir === 'desc' ? 'asc' : 'desc';
            } else {
                recentSort.key = key;
                recentSort.dir = 'desc';
            }
            updateRecentSortIcons();
            applyRecentSortAndRender();
        }

        function updateRecentSortIcons() {
            const keys = ['timestamp', 'category', 'item', 'rawAmount'];
            keys.forEach(k => {
                const el = document.getElementById(`rsort-${k}`);
                if (el) {
                    if (recentSort.key === k) {
                        el.innerText = recentSort.dir === 'desc' ? '▼' : '▲';
                        el.classList.remove('text-transparent');
                        el.classList.add('text-blue-500');
                    } else {
                        el.innerText = '▼';
                        el.classList.add('text-transparent');
                        el.classList.remove('text-blue-500');
                    }
                }
            });
        }

        function applyRecentSortAndRender() {
            recentDataCache.sort((a, b) => {
                let valA = a[recentSort.key];
                let valB = b[recentSort.key];

                if (typeof valA === 'string') {
                    return recentSort.dir === 'desc'
                        ? valB.localeCompare(valA, 'zh-TW')
                        : valA.localeCompare(valB, 'zh-TW');
                } else {
                    return recentSort.dir === 'desc'
                        ? valB - valA
                        : valA - valB;
                }
            });
            
            const listHtml = recentDataCache.length > 0 ? recentDataCache.map(t => `
                <tr class="border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                    <td class="py-3 pl-2 text-gray-500 dark:text-gray-400">${t.date}</td>
                    <td class="py-3"><span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded text-xs">${t.category}</span></td>
                    <td class="py-3 text-gray-800 dark:text-gray-200">${t.item}</td>
                    <td class="py-3 text-right pr-2 font-medium tabular-nums ${t.isExpense ? 'text-red-500 dark:text-red-400' : 'text-green-500 dark:text-green-400'}">${t.amount}</td>
                </tr>
            `).join('') : `<tr><td colspan="4" class="py-8 text-center text-gray-500 dark:text-gray-400">查無紀錄</td></tr>`;
            
            document.getElementById('transactionList').innerHTML = listHtml;
        }

        function handleSort(key) {
            if (currentSort.key === key) {
                currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
            } else {
                currentSort.key = key;
                currentSort.dir = 'desc';
            }
            updateSortIcons();
            applySortAndRender();
        }

        function updateSortIcons() {
            const keys = ['timestamp', 'category', 'item', 'rawAmount'];
            keys.forEach(k => {
                const el = document.getElementById(`sort-${k}`);
                if (el) {
                    if (currentSort.key === k) {
                        el.innerText = currentSort.dir === 'desc' ? '▼' : '▲';
                        el.classList.remove('text-transparent');
                        el.classList.add('text-blue-500');
                    } else {
                        el.innerText = '▼';
                        el.classList.add('text-transparent');
                        el.classList.remove('text-blue-500');
                    }
                }
            });
        }

        function applySortAndRender() {
            filteredDataCache.sort((a, b) => {
                let valA = a[currentSort.key];
                let valB = b[currentSort.key];

                if (typeof valA === 'string') {
                    return currentSort.dir === 'desc'
                        ? valB.localeCompare(valA, 'zh-TW')
                        : valA.localeCompare(valB, 'zh-TW');
                } else {
                    return currentSort.dir === 'desc'
                        ? valB - valA
                        : valA - valB;
                }
            });
            
            const listHtml = filteredDataCache.length > 0 ? filteredDataCache.map(t => `
                <tr class="border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                    <td class="py-3 pl-2 text-gray-500 dark:text-gray-400">${t.date}</td>
                    <td class="py-3"><span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded text-xs">${t.category}</span></td>
                    <td class="py-3 text-gray-800 dark:text-gray-200">${t.item}</td>
                    <td class="py-3 text-right pr-2 font-medium tabular-nums ${t.isExpense ? 'text-red-500 dark:text-red-400' : 'text-green-500 dark:text-green-400'}">${t.amount}</td>
                </tr>
            `).join('') : `<tr><td colspan="4" class="py-8 text-center text-gray-500 dark:text-gray-400">查無紀錄</td></tr>`;
            
            document.getElementById('filteredTransactionList').innerHTML = listHtml;
        }

        function renderCategoryChart(categoryData) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChartInstance) categoryChartInstance.destroy();

            const labels = Object.keys(categoryData);
            const data = Object.values(categoryData);
            
            if (labels.length === 0) {
                labels.push('無支出');
                data.push(1);
            }

            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#e5e7eb' : '#374151';

            categoryChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#6b7280'],
                        borderWidth: isDark ? 2 : 0,
                        borderColor: isDark ? '#1f2937' : '#ffffff',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    color: textColor,
                    plugins: {
                        legend: { position: 'right', labels: { color: textColor, boxWidth: 12, font: { family: "'Noto Sans TC', sans-serif" } } }
                    },
                    cutout: '70%'
                }
            });
        }

        function renderTrendChart(trendData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChartInstance) trendChartInstance.destroy();

            const labels = Object.values(trendData).map(d => d.label);
            const incomes = Object.values(trendData).map(d => d.income);
            const expenses = Object.values(trendData).map(d => d.expense);

            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#9ca3af' : '#6b7280';
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.1)' : '#f3f4f6';

            trendChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '收入', data: incomes, backgroundColor: '#10b981', borderRadius: 4 },
                        { label: '支出', data: expenses, backgroundColor: '#ef4444', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    color: textColor,
                    plugins: {
                        legend: { position: 'top', align: 'end', labels: { color: textColor, boxWidth: 12, font: { family: "'Noto Sans TC', sans-serif" } } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { color: textColor },
                            grid: { borderDash: [2, 4], color: gridColor, drawBorder: false } 
                        },
                        x: { 
                            ticks: { color: textColor },
                            grid: { display: false, drawBorder: false } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
